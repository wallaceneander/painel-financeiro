<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Fundo azul -->
  <rect width="512" height="512" fill="#0a4a8a" rx="80"/>
  
  <!-- Cifrão branco -->
  <text x="256" y="380" font-family="Arial, sans-serif" font-size="320" font-weight="bold" fill="#ffffff" text-anchor="middle">$</text>
  
  <!-- Gráfico de linha simples -->
  <path d="M 80 280 L 150 240 L 220 260 L 290 200 L 360 220 L 430 180" 
        stroke="#4CAF50" 
        stroke-width="8" 
        fill="none" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  
  <!-- Pontos no gráfico -->
  <circle cx="80" cy="280" r="6" fill="#4CAF50"/>
  <circle cx="150" cy="240" r="6" fill="#4CAF50"/>
  <circle cx="220" cy="260" r="6" fill="#4CAF50"/>
  <circle cx="290" cy="200" r="6" fill="#4CAF50"/>
  <circle cx="360" cy="220" r="6" fill="#4CAF50"/>
  <circle cx="430" cy="180" r="6" fill="#4CAF50"/>
</svg>
